<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ngọc Lan - Bình Thuận Pro</title>
    <!-- Thư viện hỗ trợ từ CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.15.0/babel.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #f8fafc; 
            overscroll-behavior-y: contain;
        }
        .premium-card { background: #ffffff; border-radius: 20px; box-shadow: 0 4px 20px rgba(15, 23, 42, 0.04); }
        .tab-active { color: #2563eb; transform: translateY(-2px); font-weight: 900; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes customSlideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .anim-up { animation: customSlideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .font-invoice { font-family: "Times New Roman", Times, serif !important; }
        .pulse-cart { animation: pulse-effect 2s infinite; }
        @keyframes pulse-effect {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(59, 130, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- Hệ thống biểu tượng SVG gọn nhẹ ---
        const IconSearch = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const IconHome = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
        const IconReport = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>;
        const IconCart = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>;

        // Dữ liệu chạy thử ban đầu để Chị đẹp dễ dàng trải nghiệm
        const MOCK_DATA = {
            products: [
                { name: "Thanh long ruột đỏ xuất khẩu (Thùng 10kg)", price: 280000 },
                { name: "Mủ trôm Bình Thuận loại 1 (Hộp 500g)", price: 175000 },
                { name: "Nho xanh Ninh Thuận loại ngọt (Khay 1kg)", price: 95000 },
                { name: "Nước ép thanh long nguyên chất (Chai 350ml)", price: 25000 },
                { name: "Rượu vang thanh long đặc sản (Chai 750ml)", price: 320000 }
            ],
            customers: [
                { name: "Anh Hoàng Phan Thiết", note: "0912345678 - Giao ngã 4 CMT8" },
                { name: "Chị Thảo Mũi Né", note: "0987654321 - Giao resort Ocean" },
                { name: "Chú Năm Hàm Thuận Bắc", note: "0909998887 - Nhận tại kho đại lý" }
            ],
            sales: [
                { date: new Date().toISOString(), customer: "Anh Hoàng Phan Thiết", total: 455000, details: "Thanh long ruột đỏ xuất khẩu (Thùng 10kg) (x1) [Giá:280000], Mủ trôm Bình Thuận loại 1 (Hộp 500g) (x1) [Giá:175000]", note: "0912345678 - Giao ngã 4 CMT8" },
                { date: new Date(Date.now() - 86400000).toISOString(), customer: "Chị Thảo Mũi Né", total: 190000, details: "Nho xanh Ninh Thuận loại ngọt (Khay 1kg) (x2) [Giá:95000]", note: "0987654321 - Giao resort Ocean" }
            ]
        };

        const parseProduct = (fullName) => {
            if (!fullName) return { name: '', spec: '' };
            const match = fullName.match(/^(.*?)\s*\(([^)]+)\)\s*$/);
            return match ? { name: match[1].trim(), spec: `(${match[2].trim()})` } : { name: fullName, spec: '' };
        };

        function App() {
            // --- Quản lý State ---
            const [view, setView] = useState('pos');
            const [cart, setCart] = useState([]);
            const [customer, setCustomer] = useState('Khách lẻ');
            const [orderNote, setOrderNote] = useState('');
            const [custSearch, setCustSearch] = useState('');
            const [prodSearch, setProdSearch] = useState('');
            const [cloudData, setCloudData] = useState(() => {
                const saved = localStorage.getItem('NL_PRO_MOCK_DATA');
                return saved ? JSON.parse(saved) : MOCK_DATA;
            });
            const [sheetUrl, setSheetUrl] = useState(localStorage.getItem('NL_PRO_POS_URL') || '');
            const [loading, setLoading] = useState(false);
            const [showBill, setShowBill] = useState(false);
            const [billImg, setBillImg] = useState(null);
            const [previewData, setPreviewData] = useState(null);
            
            const [selectingItem, setSelectingItem] = useState(null);
            const [isEditing, setIsEditing] = useState(false);
            const [inputQty, setInputQty] = useState(1);
            const [inputNote, setInputNote] = useState('');
            
            const [showAddModal, setShowAddModal] = useState(null);
            const [formData, setFormData] = useState({ name: '', val: '' });
            
            const [reportFilter, setReportFilter] = useState('day');
            const [customDate, setCustomDate] = useState({ start: '', end: '' });
            const [toast, setToast] = useState(null);

            const receiptRef = useRef(null);
            const cartEndRef = useRef(null);

            // Tự động lưu mockData cục bộ dành riêng cho bản Pro
            useEffect(() => {
                if (!sheetUrl) {
                    localStorage.setItem('NL_PRO_MOCK_DATA', JSON.stringify(cloudData));
                }
            }, [cloudData, sheetUrl]);

            useEffect(() => {
                if (sheetUrl) {
                    fetchData();
                } else {
                    triggerToast("Đang hoạt động ở Chế độ Chạy Thử (Demo Mode)!", "info");
                }
            }, []);

            const triggerToast = (message, type = 'info') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 2500);
            };

            // Đồng bộ dữ liệu trực tuyến
            const fetchData = async () => {
                if (!sheetUrl) {
                    triggerToast("Đang dùng dữ liệu mẫu. Thêm liên kết Google Sheets ở phần Cài đặt nhé!", "info");
                    return;
                }
                setLoading(true);
                try {
                    const res = await fetch(`${sheetUrl}?action=getData&_t=${Date.now()}`);
                    const data = await res.json();
                    setCloudData({
                        products: Array.isArray(data.products) ? data.products : [],
                        customers: Array.isArray(data.customers) ? data.customers : [],
                        sales: Array.isArray(data.sales) ? data.sales : []
                    });
                    triggerToast("Đã đồng bộ thành công dữ liệu từ Google Sheets!", "success");
                } catch (e) { 
                    console.error(e); 
                    triggerToast("Kết nối thất bại. Chị đẹp kiểm tra lại URL nhé!", "error");
                }
                setLoading(false);
            };

            // --- Bộ lọc tìm kiếm ---
            const filteredCustomers = useMemo(() => {
                if (!custSearch.trim()) return [];
                return cloudData.customers.filter(c => c && c.name && c.name.toLowerCase().includes(custSearch.toLowerCase()));
            }, [custSearch, cloudData.customers]);

            const filteredProducts = useMemo(() => {
                return cloudData.products.filter(p => p && p.name && p.name.toLowerCase().includes(prodSearch.toLowerCase()));
            }, [prodSearch, cloudData.products]);

            const filteredSales = useMemo(() => {
                const now = new Date();
                return cloudData.sales.filter(s => {
                    const dateVal = s.date || s['Ngày'];
                    if (!dateVal) return false;
                    const saleDate = new Date(dateVal);
                    if (isNaN(saleDate.getTime())) return false;

                    if (reportFilter === 'day') return saleDate.toDateString() === now.toDateString();
                    if (reportFilter === 'month') return saleDate.getMonth() === now.getMonth() && saleDate.getFullYear() === now.getFullYear();
                    if (reportFilter === 'year') return saleDate.getFullYear() === now.getFullYear();
                    if (reportFilter === 'custom') {
                        if (!customDate.start || !customDate.end) return true;
                        const start = new Date(customDate.start); start.setHours(0,0,0,0);
                        const end = new Date(customDate.end); end.setHours(23,59,59,999);
                        return saleDate >= start && saleDate <= end;
                    }
                    return true;
                });
            }, [cloudData.sales, reportFilter, customDate]);

            const reportTotal = useMemo(() => {
                return filteredSales.reduce((acc, s) => acc + Number(s.total || s['Tổng'] || 0), 0);
            }, [filteredSales]);

            // --- Xử lý Giỏ hàng ---
            const handleSelectItem = (product) => {
                setSelectingItem(product);
                setIsEditing(false);
                setInputQty(1);
                setInputNote('');
            };

            const handleEditCartItem = (item, index) => {
                setSelectingItem({ ...item, cartIndex: index });
                setIsEditing(true);
                setInputQty(item.qty);
                setInputNote(item.note || '');
            };

            const handleUpdateCart = () => {
                const qty = Math.max(1, parseInt(inputQty) || 1);
                if (isEditing) {
                    const newCart = [...cart];
                    newCart[selectingItem.cartIndex] = { ...newCart[selectingItem.cartIndex], qty, note: inputNote };
                    setCart(newCart);
                    triggerToast("Đã cập nhật giỏ hàng!", "success");
                } else {
                    setCart([...cart, { 
                        ...selectingItem, 
                        qty, 
                        note: inputNote, 
                        appliedPrice: Number(selectingItem.price) || 0, 
                        id: Date.now() 
                    }]);
                    triggerToast("Đã thêm vào giỏ hàng!", "success");
                    setTimeout(() => cartEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 150);
                }
                setSelectingItem(null);
            };

            const removeFromCart = (index) => {
                setCart(cart.filter((_, i) => i !== index));
                setSelectingItem(null);
                triggerToast("Đã xóa sản phẩm khỏi đơn.");
            };

            // --- Lưu Đơn & Xuất Hóa Đơn Ảnh ---
            const saveOrder = async () => {
                if (cart.length === 0) {
                    triggerToast("Giỏ hàng trống trơn rồi Chị đẹp ơi!", "error");
                    return;
                }
                setLoading(true);
                setPreviewData(null); 
                const total = cart.reduce((acc, i) => acc + (i.appliedPrice * i.qty), 0);
                const details = cart.map(i => `${i.name} (x${i.qty}) [Giá:${i.appliedPrice}]${i.note ? ` [Ghi chú: ${i.note}]` : ''}`).join(', ');
                const orderData = { date: new Date().toISOString(), customer, note: orderNote, total, details };
                
                // Lưu vào local/cloud tùy chế độ
                if (!sheetUrl) {
                    // Chế độ chạy thử: thêm trực tiếp vào state cục bộ
                    setCloudData(prev => ({
                        ...prev,
                        sales: [...prev.sales, orderData]
                    }));
                    setTimeout(() => {
                        setShowBill(true);
                        generateBillImage();
                    }, 500);
                } else {
                    try {
                        await fetch(sheetUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'saveOrder', ...orderData }) });
                        setShowBill(true);
                        generateBillImage();
                    } catch (e) { 
                        triggerToast("Lỗi kết nối khi lưu đơn lên Google Sheets!", "error"); 
                        setLoading(false); 
                    }
                }
            };

            const generateBillImage = () => {
                setTimeout(async () => {
                    if (receiptRef.current) {
                        try {
                            const canvas = await html2canvas(receiptRef.current, { 
                                scale: 2, useCORS: true, allowTaint: true, backgroundColor: "#ffffff"
                            });
                            setBillImg(canvas.toDataURL('image/png'));
                            triggerToast("Đã tạo ảnh hóa đơn sắc nét thành công!", "success");
                        } catch (err) {
                            triggerToast("Không thể tự động xuất ảnh hóa đơn!", "error");
                        }
                    }
                    setLoading(false);
                }, 1500);
            };

            // Xem lại hóa đơn cũ
            const handleViewHistory = (sale) => {
                setLoading(true);
                const detailsStr = sale.details || sale['Chi tiết'] || "";
                
                // Tách chuỗi sản phẩm trong chi tiết đơn hàng
                const itemStrings = detailsStr.split(/, (?=[^\]]*(?:\[|$))/); 
                const items = itemStrings.map((str, idx) => {
                    const nameMatch = str.match(/^(.*?) \(x(\d+)\)/);
                    const priceMatch = str.match(/\[Giá:?\s*(\d+)\]/i);
                    const noteMatch = str.match(/\[Ghi chú:?\s*(.*?)\]/i);
                    return {
                        id: Date.now() + idx, 
                        name: nameMatch ? nameMatch[1].trim() : str.trim(),
                        qty: nameMatch ? parseInt(nameMatch[2]) : 1,
                        appliedPrice: priceMatch ? parseInt(priceMatch[1]) : 0,
                        note: noteMatch ? noteMatch[1].trim() : ''
                    };
                });

                setPreviewData({
                    customer: sale.customer || sale['Khách hàng'] || 'Khách lẻ',
                    note: sale.note || sale['Ghi chú'] || '',
                    date: new Date(sale.date || sale['Ngày']).toLocaleString('vi-VN'),
                    total: sale.total || sale['Tổng'] || 0,
                    items
                });
                setShowBill(true);
                
                setTimeout(async () => {
                    if (receiptRef.current) {
                        try {
                            const canvas = await html2canvas(receiptRef.current, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
                            setBillImg(canvas.toDataURL('image/png'));
                        } catch (err) {
                            triggerToast("Lỗi kết xuất ảnh lịch sử!", "error");
                        }
                    }
                    setLoading(false);
                }, 1200);
            };

            const handleEditOldOrder = () => {
                if (!previewData) return;
                setCart(previewData.items);
                setCustomer(previewData.customer);
                setOrderNote(previewData.note + " (Sửa đơn cũ)");
                setShowBill(false); setBillImg(null); setPreviewData(null);
                setView('pos');
                triggerToast("Đã nạp lại danh sách hàng của đơn cũ!");
            };

            const closeBill = () => {
                setShowBill(false); 
                setBillImg(null);
                if (!previewData) { 
                    setCart([]); 
                    setCustomer('Khách lẻ'); 
                    setOrderNote(''); 
                    if (sheetUrl) fetchData(); 
                }
                setPreviewData(null);
            };

            // Thêm khách hàng mới/Sản phẩm mới
            const handleAddNew = async () => {
                if (!formData.name.trim()) {
                    triggerToast("Chị đẹp vui lòng điền đủ tên thông tin nhé!", "error");
                    return;
                }
                setLoading(true);

                if (!sheetUrl) {
                    // Chế độ Demo: thêm trực tiếp vào state cục bộ
                    if (showAddModal === 'cust') {
                        setCloudData(prev => ({
                            ...prev,
                            customers: [...prev.customers, { name: formData.name.trim(), note: formData.val }]
                        }));
                    } else {
                        setCloudData(prev => ({
                            ...prev,
                            products: [...prev.products, { name: formData.name.trim(), price: Number(formData.val) || 0 }]
                        }));
                    }
                    setShowAddModal(null);
                    setFormData({ name: '', val: '' });
                    triggerToast("Thêm mới thành công vào bộ nhớ tạm!", "success");
                    setLoading(false);
                } else {
                    const action = showAddModal === 'cust' ? 'addCustomer' : 'addProduct';
                    const payload = { action, name: formData.name.trim() };
                    if (showAddModal === 'cust') { payload.note = formData.val; } 
                    else { payload.price = Number(formData.val) || 0; }

                    try {
                        await fetch(sheetUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                        setShowAddModal(null); 
                        setFormData({ name: '', val: '' });
                        triggerToast("Đã lưu trực tuyến! Đang tải lại dữ liệu...", "success");
                        setTimeout(fetchData, 1200);
                    } catch (e) { 
                        triggerToast("Không thể gửi dữ liệu lên Google Sheets!", "error"); 
                    }
                    setLoading(false);
                }
            };

            const resetDemoData = () => {
                if (window.confirm("Chị đẹp có chắc chắn muốn cài đặt lại toàn bộ dữ liệu chạy thử ban đầu không?")) {
                    setCloudData(MOCK_DATA);
                    localStorage.removeItem('NL_PRO_MOCK_DATA');
                    triggerToast("Đã khôi phục dữ liệu mẫu!", "success");
                }
            };

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative overflow-hidden bg-slate-50 text-slate-900 shadow-2xl border-x border-slate-200">
                    
                    {/* Header thương hiệu cao cấp */}
                    <header className="px-5 py-4 bg-white/80 backdrop-blur-md flex justify-between items-center z-20 border-b border-slate-100 sticky top-0">
                        <div className="flex flex-col">
                            <h1 className="text-xl font-black text-blue-600 tracking-tight italic uppercase leading-none flex items-center gap-1.5">
                                Ngọc Lan
                            </h1>
                            <span className="text-[10px] font-bold text-slate-400 tracking-wider mt-1 uppercase">Bình Thuận • Hệ Thống POS</span>
                        </div>
                        <div className="flex items-center gap-2">
                            {!sheetUrl && (
                                <span className="bg-amber-100 text-amber-700 text-[9px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider animate-pulse">Demo Mode</span>
                            )}
                            <button onClick={fetchData} className={`p-2.5 bg-slate-100 rounded-full text-sm active:scale-95 transition-transform ${loading ? 'animate-spin' : ''}`}>🔄</button>
                        </div>
                    </header>

                    {/* Toast Alert */}
                    {toast && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[350] bg-slate-900 text-white text-xs font-bold px-5 py-3.5 rounded-2xl shadow-xl flex items-center gap-2.5 anim-up">
                            <span className={toast.type === 'success' ? 'text-green-400' : toast.type === 'error' ? 'text-red-400' : 'text-blue-400'}>
                                {toast.type === 'success' ? '✓' : toast.type === 'error' ? '✖' : 'ℹ'}
                            </span>
                            {toast.message}
                        </div>
                    )}

                    {/* Vùng Content cuộn độc lập */}
                    <main className="flex-1 overflow-y-auto p-4 pb-44 no-scrollbar scroll-smooth">
                        {view === 'pos' && (
                            <div className="space-y-4 anim-up">
                                
                                {/* Tìm nhanh khách hàng */}
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-4 flex items-center text-slate-400"><IconSearch /></div>
                                    <input className="w-full pl-11 pr-4 py-3.5 premium-card outline-none text-sm font-semibold focus:ring-2 focus:ring-blue-500/20" placeholder="Tìm kiếm nhanh tên khách hàng..." value={custSearch} onChange={e => setCustSearch(e.target.value)} />
                                </div>
                                {filteredCustomers.length > 0 && (
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                        {filteredCustomers.map((c, i) => (
                                            <button key={i} onClick={() => { setCustomer(c.name); setOrderNote(c.note || ''); setCustSearch(''); }} className="px-4 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-full text-[11px] font-bold uppercase whitespace-nowrap shadow-md">{c.name}</button>
                                        ))}
                                    </div>
                                )}
                                
                                {/* Thẻ Khách hàng */}
                                <div className="premium-card p-5 border-l-4 border-blue-600">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider">Thông tin khách hàng</span> 
                                        <button onClick={() => setShowAddModal('cust')} className="text-blue-600 font-extrabold text-[11px] uppercase hover:underline">+ Khách mới</button>
                                    </div>
                                    <input className="w-full font-black text-xl bg-transparent outline-none border-b border-transparent focus:border-slate-200 py-0.5" value={customer} onChange={e => setCustomer(e.target.value)} />
                                    <input className="w-full text-xs font-semibold text-slate-400 bg-transparent outline-none mt-1.5" value={orderNote} onChange={e => setOrderNote(e.target.value)} placeholder="Số điện thoại / Địa chỉ giao..." />
                                </div>

                                {/* Danh sách sản phẩm */}
                                <div className="space-y-3 pt-2">
                                    <div className="flex justify-between items-center px-1">
                                        <span className="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider">Danh mục sản phẩm</span>
                                        <button onClick={() => setShowAddModal('prod')} className="text-blue-600 font-extrabold text-[11px] uppercase hover:underline">+ Sản phẩm mới</button>
                                    </div>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-4 flex items-center text-slate-400"><IconSearch /></div>
                                        <input className="w-full pl-11 pr-4 py-3.5 premium-card outline-none text-sm font-semibold focus:ring-2 focus:ring-blue-500/20" placeholder="Tìm kiếm tên sản phẩm..." value={prodSearch} onChange={e => setProdSearch(e.target.value)} />
                                    </div>
                                    
                                    <div className="flex flex-col gap-3">
                                        {filteredProducts.map((p, i) => {
                                            const { name, spec } = parseProduct(p.name);
                                            return (
                                                <button key={i} onClick={() => handleSelectItem(p)} className="premium-card p-4 text-left active:scale-[0.98] transition-all border border-slate-100 flex justify-between items-center w-full group">
                                                    <div className="flex-1 pr-3">
                                                        <div className="text-sm font-bold text-slate-800 uppercase line-clamp-2 tracking-tight group-hover:text-blue-600 transition-colors">{name}</div>
                                                        {spec && <div className="text-xs font-semibold text-blue-500 mt-1 bg-blue-50 px-2 py-0.5 rounded-md inline-block">{spec}</div>}
                                                    </div>
                                                    <div className="text-right flex-shrink-0">
                                                        <div className="text-base font-black italic text-slate-900">{Number(p.price || 0).toLocaleString()}đ</div>
                                                        <div className="text-[9px] text-blue-500 font-extrabold uppercase mt-1 tracking-widest">Chọn ➔</div>
                                                    </div>
                                                </button>
                                            );
                                        })}
                                        {filteredProducts.length === 0 && (
                                            <div className="text-center py-10 text-xs font-bold text-slate-400 bg-white rounded-2xl shadow-sm">
                                                Không tìm thấy sản phẩm phù hợp.
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Giỏ hàng đang chọn */}
                                {cart.length > 0 && (
                                    <div className="space-y-2.5 pt-4 border-t-2 border-dashed border-slate-200">
                                        <div className="flex justify-between items-center px-1">
                                            <span className="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider">Đơn hàng đang chọn ({cart.length})</span>
                                            <button onClick={() => { setCart([]); triggerToast("Đã dọn sạch giỏ hàng!"); }} className="text-red-500 font-extrabold text-[10px] uppercase hover:underline">Xóa hết ✖</button>
                                        </div>
                                        {cart.map((item, i) => {
                                            const { name, spec } = parseProduct(item.name);
                                            return (
                                                <div key={i} onClick={() => handleEditCartItem(item, i)} className="premium-card p-4 flex justify-between items-center anim-up border-r-4 border-blue-500 active:bg-slate-50 transition-colors">
                                                    <div className="flex-1 pr-2">
                                                        <div className="text-sm font-bold uppercase text-slate-800">
                                                            {name} <span className="text-blue-600 font-black">x{item.qty}</span>
                                                        </div>
                                                        {spec && <span className="text-xs font-semibold text-blue-500 inline-block mt-0.5">{spec}</span>}
                                                        {item.note && <div className="text-[11px] font-medium text-amber-600 italic mt-1 bg-amber-50 px-2 py-0.5 rounded-md inline-block">📌 {item.note}</div>}
                                                    </div>
                                                    <div className="text-right flex-shrink-0">
                                                        <div className="font-bold text-slate-900">{(item.appliedPrice * item.qty).toLocaleString()}đ</div>
                                                        <div className="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Sửa ✎</div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        <div ref={cartEndRef} className="h-2 w-full"></div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'report' && (
                            <div className="space-y-4 anim-up pb-10">
                                {/* Doanh thu */}
                                <div className="premium-card p-4 flex flex-col gap-3.5">
                                    <div className="flex bg-slate-100 p-1 rounded-xl">
                                        {['day', 'month', 'year', 'custom'].map(type => (
                                            <button key={type} onClick={() => setReportFilter(type)} className={`flex-1 py-2 text-[11px] font-black uppercase rounded-lg transition-all ${reportFilter === type ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>
                                                {type === 'day' ? 'Hôm nay' : type === 'month' ? 'Tháng' : type === 'year' ? 'Năm' : 'Lọc Ngày'}
                                            </button>
                                        ))}
                                    </div>
                                    {reportFilter === 'custom' && (
                                        <div className="flex gap-2 items-center px-1 anim-up">
                                            <input type="date" className="flex-1 text-xs font-bold p-2.5 bg-slate-50 border border-slate-100 rounded-xl outline-none text-center" value={customDate.start} onChange={e => setCustomDate({...customDate, start: e.target.value})} />
                                            <span className="text-slate-400 font-bold">➔</span>
                                            <input type="date" className="flex-1 text-xs font-bold p-2.5 bg-slate-50 border border-slate-100 rounded-xl outline-none text-center" value={customDate.end} onChange={e => setCustomDate({...customDate, end: e.target.value})} />
                                        </div>
                                    )}
                                    <div className="px-1 pt-2 flex justify-between items-center border-t border-slate-100">
                                        <div className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">Tổng doanh thu kỳ này:</div>
                                        <div className="text-2xl font-black italic text-blue-600">{reportTotal.toLocaleString()}đ</div>
                                    </div>
                                </div>

                                {/* Danh sách hóa đơn cũ */}
                                <div className="space-y-3">
                                    <div className="px-1 text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">Lịch sử bán hàng ({filteredSales.length})</div>
                                    {filteredSales.slice().reverse().map((s, i) => (
                                        <div key={i} className="premium-card p-4 flex justify-between items-center">
                                            <div className="flex-1 mr-2 truncate">
                                                <div className="text-sm font-bold uppercase truncate text-slate-800">{s.customer || s['Khách hàng']}</div>
                                                <div className="text-[10px] font-semibold text-slate-400 mt-1">{new Date(s.date || s['Ngày']).toLocaleString('vi-VN')}</div>
                                            </div>
                                            <div className="text-right flex-shrink-0 flex flex-col items-end gap-1.5">
                                                <div className="text-sm font-black text-slate-900">{(Number(s.total || s['Tổng'])).toLocaleString()}đ</div>
                                                <button onClick={() => handleViewHistory(s)} className="px-3 py-1.5 bg-slate-100 hover:bg-blue-50 hover:text-blue-600 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-colors">Chi tiết</button>
                                            </div>
                                        </div>
                                    ))}
                                    {filteredSales.length === 0 && (
                                        <div className="text-center py-12 text-xs font-semibold text-slate-400">Không có dữ liệu hóa đơn nào trong kỳ lọc.</div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="space-y-4 anim-up">
                                <div className="premium-card p-6 space-y-5">
                                    <div>
                                        <h3 className="font-black text-lg text-slate-800">Cấu hình kết nối Cloud</h3>
                                        <p className="text-xs text-slate-400 mt-1">Dán liên kết Web App của Google Apps Script để kết nối dữ liệu bán hàng trực tuyến.</p>
                                    </div>
                                    <textarea className="w-full p-4 bg-slate-50 border border-slate-200/60 rounded-2xl text-xs font-mono outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/10" rows="5" value={sheetUrl} onChange={e => {setSheetUrl(e.target.value); localStorage.setItem('NL_PRO_POS_URL', e.target.value)}} placeholder="https://script.google.com/macros/s/.../exec" />
                                    <button onClick={() => {fetchData(); setView('pos');}} className="w-full bg-slate-900 hover:bg-slate-800 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs active:scale-[0.98] transition-all shadow-md">Đồng bộ dữ liệu</button>
                                </div>

                                {!sheetUrl && (
                                    <div className="premium-card p-6 border-2 border-dashed border-amber-300 bg-amber-50/50 space-y-3">
                                        <h4 className="text-xs font-black uppercase text-amber-800 tracking-wider">🛠 Chức năng Chạy thử mẫu</h4>
                                        <p className="text-xs text-slate-600 leading-relaxed">Chị đẹp đang vận hành ở chế độ Demo ngoại tuyến. Các thao tác thêm sản phẩm, đặt hàng và xem báo cáo đều hoạt động ổn định trên bộ nhớ đệm thiết bị.</p>
                                        <button onClick={resetDemoData} className="text-xs font-black uppercase text-red-600 hover:underline">Khôi phục cài đặt gốc mẫu ⟲</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Thanh Navigation Dưới Cùng */}
                    <nav className="fixed bottom-0 inset-x-0 bg-white/80 backdrop-blur-xl border-t border-slate-100 px-8 py-4 flex justify-around items-center z-50 rounded-t-[28px] shadow-lg max-w-md mx-auto">
                        <button onClick={() => setView('pos')} className={`flex flex-col items-center gap-1 transition-transform ${view === 'pos' ? 'tab-active' : 'text-slate-400'}`}><IconHome /><span className="text-[9px] uppercase tracking-wider">Bán hàng</span></button>
                        <button onClick={() => setView('report')} className={`flex flex-col items-center gap-1 transition-transform ${view === 'report' ? 'tab-active' : 'text-slate-400'}`}><IconReport /><span className="text-[9px] uppercase tracking-wider">Báo cáo</span></button>
                        <button onClick={() => setView('settings')} className={`flex flex-col items-center gap-1 transition-transform ${view === 'settings' ? 'tab-active' : 'text-slate-400'}`}>⚙️<span className="text-[9px] uppercase tracking-wider">Cài đặt</span></button>
                    </nav>

                    {/* Thanh toán nhanh nổi */}
                    {view === 'pos' && cart.length > 0 && !selectingItem && (
                        <div className="fixed bottom-24 inset-x-4 z-40 anim-up flex flex-col gap-3 max-w-md mx-auto">
                            <button 
                                onClick={() => cartEndRef.current?.scrollIntoView({ behavior: 'smooth' })}
                                className="self-end w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center text-blue-600 border border-slate-100 relative active:scale-90 transition-transform pulse-cart"
                            >
                                <IconCart />
                                <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black px-1.5 py-0.5 rounded-full border-2 border-white leading-none">
                                    {cart.reduce((acc, i) => acc + i.qty, 0)}
                                </span>
                            </button>

                            <button onClick={saveOrder} className="w-full bg-slate-900 text-white p-4.5 rounded-2xl shadow-xl flex justify-between items-center active:scale-[0.98] transition-all">
                                <div className="text-left">
                                    <div className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Tổng tiền đơn hàng</div>
                                    <div className="text-xl font-black italic">
                                        {cart.reduce((acc, i) => acc + (i.appliedPrice * i.qty), 0).toLocaleString()}đ
                                    </div>
                                </div>
                                <div className="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-black text-xs uppercase tracking-wider">LƯU ĐƠN & IN ➔</div>
                            </button>
                        </div>
                    )}

                    {/* Modal Thêm số lượng & Ghi chú sản phẩm */}
                    {selectingItem && (() => {
                        const { name, spec } = parseProduct(selectingItem.name);
                        return (
                            <div className="fixed inset-0 bg-black/50 z-[100] flex items-end backdrop-blur-sm">
                                <div className="bg-white w-full p-6 rounded-t-[32px] space-y-5 anim-up max-w-md mx-auto">
                                    <div className="flex justify-between items-start">
                                        <div className="flex-1 pr-3">
                                            <div className="text-[10px] font-extrabold text-blue-600 uppercase mb-0.5">{isEditing ? 'Thay đổi thông số' : 'Thêm vào đơn hàng'}</div>
                                            <div className="font-black text-lg uppercase tracking-tight text-slate-800 leading-snug">{name}</div>
                                            {spec && <span className="text-xs font-bold text-blue-500 inline-block mt-1 bg-blue-50 px-2 py-0.5 rounded-md">{spec}</span>}
                                        </div>
                                        {isEditing && (
                                            <button onClick={() => removeFromCart(selectingItem.cartIndex)} className="px-3 py-1.5 bg-red-50 text-red-500 rounded-xl text-[10px] font-black uppercase tracking-wide">Xóa bỏ</button>
                                        )}
                                    </div>
                                    <div className="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                        <button onClick={() => setInputQty(Math.max(1, (parseInt(inputQty) || 1) - 1))} className="w-12 h-12 bg-white rounded-xl shadow-sm text-xl font-bold flex items-center justify-center select-none active:bg-slate-100">-</button>
                                        <input 
                                            type="number" 
                                            inputMode="numeric" 
                                            className="w-28 bg-transparent text-center text-4xl font-black italic outline-none text-slate-900 border-b-2 border-slate-200 focus:border-blue-600 transition-colors" 
                                            value={inputQty} 
                                            onChange={(e) => {
                                                const v = e.target.value;
                                                setInputQty(v === '' ? '' : parseInt(v) || 0);
                                            }} 
                                            onBlur={() => { if (inputQty === '' || inputQty <= 0) setInputQty(1); }}
                                            onFocus={(e) => e.target.select()} 
                                        />
                                        <button onClick={() => setInputQty((parseInt(inputQty) || 0) + 1)} className="w-12 h-12 bg-white rounded-xl shadow-sm text-xl font-bold flex items-center justify-center select-none active:bg-slate-100">+</button>
                                    </div>
                                    <input className="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none font-semibold text-center italic text-sm text-slate-700" placeholder="Thêm ghi chú riêng cho sản phẩm này..." value={inputNote} onChange={e => setInputNote(e.target.value)} />
                                    <div className="flex gap-3">
                                        <button onClick={() => setSelectingItem(null)} className="flex-1 py-4 font-bold text-slate-400 text-sm uppercase tracking-wider">Hủy</button>
                                        <button onClick={handleUpdateCart} className="flex-[2] bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-black uppercase text-sm tracking-widest shadow-md">Xác nhận</button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* Modal Xem trước / Xuất Hóa Đơn Ảnh */}
                    {showBill && (
                        <div className="fixed inset-0 z-[200] bg-black/70 backdrop-blur-md flex flex-col justify-end">
                            <div className="bg-white w-full rounded-t-[32px] p-5 space-y-4 anim-up flex flex-col max-h-[92vh] max-w-md mx-auto">
                                <div className="w-12 h-1 bg-slate-200 rounded-full mx-auto"></div>
                                <div className="flex-1 overflow-y-auto rounded-2xl border border-slate-100 bg-slate-100 no-scrollbar shadow-inner">
                                    {billImg ? <img src={billImg} className="w-full h-auto" alt="Hoa don" /> : <div className="h-64 flex flex-col items-center justify-center gap-2 font-black text-blue-600 animate-pulse text-xs uppercase tracking-widest"><span>⚡ Hệ thống đang tạo ảnh</span><span>VUI LÒNG ĐỢI GIÂY LÁT...</span></div>}
                                </div>
                                
                                <div className="flex gap-3">
                                    <button onClick={closeBill} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-xl font-black uppercase text-xs tracking-wider">Đóng</button>
                                    {previewData && (
                                        <button onClick={handleEditOldOrder} className="flex-[1.5] bg-amber-500 text-white py-4 rounded-xl font-black uppercase text-xs tracking-wider active:scale-[0.98] transition-transform">✏️ Sửa đơn này</button>
                                    )}
                                    {!previewData && <button onClick={closeBill} className="flex-[2] bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-xs tracking-wider text-center shadow-md">Hoàn thành</button>}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Thêm Nhanh Đối Tượng (Khách/Sản phẩm) */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/50 z-[250] flex items-center p-4 backdrop-blur-sm">
                            <div className="bg-white w-full p-6 rounded-2xl space-y-4 anim-up max-w-sm mx-auto">
                                <h3 className="font-black text-center uppercase text-blue-600 tracking-wider text-sm">{showAddModal === 'cust' ? 'Thêm thông tin khách hàng' : 'Thêm mã sản phẩm mới'}</h3>
                                <input className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold text-sm" placeholder={showAddModal === 'cust' ? 'Nhập tên khách hàng...' : 'Nhập tên sản phẩm...'} value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                <input className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold text-sm" placeholder={showAddModal === 'cust' ? 'Nhập SĐT/Địa chỉ khách...' : 'Nhập giá bán lẻ...'} type={showAddModal === 'prod' ? 'number' : 'text'} value={formData.val} onChange={e => setFormData({...formData, val: e.target.value})} />
                                <div className="flex gap-3 pt-1">
                                    <button onClick={() => { setShowAddModal(null); setFormData({name:'', val:''}); }} className="flex-1 py-3.5 font-bold text-slate-400 text-xs uppercase tracking-wider">Hủy</button>
                                    <button onClick={handleAddNew} className="flex-1 py-3.5 bg-blue-600 text-white rounded-xl font-black uppercase text-xs tracking-wider shadow-md">Thêm mới</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VÙNG CHỨA HÓA ĐƠN CHẤT LƯỢCO CAO (ẨN KHỎI MÀN HÌNH ĐỂ CHỤP ẢNH) */}
                    <div className="fixed -left-[9999px] top-0 font-invoice">
                        <div ref={receiptRef} className="w-[750px] bg-white p-14 text-black">
                            <div className="text-center mb-12">
                                <h1 className="text-5xl font-black uppercase tracking-wide text-slate-900 mb-2">Ngọc Lan</h1>
                                <p className="text-xl font-bold uppercase tracking-[0.3em] text-slate-500">Bình Thuận</p>
                            </div>
                            <div className="text-center mb-10 border-y-4 border-double border-black py-3">
                                <h2 className="text-2xl font-black uppercase tracking-[0.2em]">Hóa Đơn Bán Hàng</h2>
                            </div>
                            <div className="mb-10 space-y-3 text-xl">
                                <div className="flex justify-between">
                                    <span>Khách hàng: <strong className="text-2xl">{previewData ? previewData.customer : customer}</strong></span>
                                    <span className="italic">Ngày: {previewData ? previewData.date : new Date().toLocaleString('vi-VN')}</span>
                                </div>
                                {(previewData ? previewData.note : orderNote) && (
                                    <div className="italic border-l-4 border-black pl-3 py-1 bg-slate-50 text-slate-800">
                                        📌 Thông tin: {previewData ? previewData.note : orderNote}
                                    </div>
                                )}
                            </div>
                            <table className="w-full mb-12 border-collapse">
                                <thead className="border-b-2 border-black">
                                    <tr className="text-xl font-bold uppercase text-left">
                                        <th className="py-4 w-[45%]">Tên Mặt Hàng</th>
                                        <th className="py-4 text-center w-[12%]">SL</th>
                                        <th className="py-4 text-right w-[18%]">Đơn Giá</th>
                                        <th className="py-4 text-right w-[25%]">Thành Tiền</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {(previewData ? previewData.items : cart).map((item, i) => {
                                        const { name, spec } = parseProduct(item.name);
                                        return (
                                            <tr key={i} className="border-b border-dashed border-slate-300 text-lg">
                                                <td className="py-5 pr-2">
                                                    <div className="font-bold uppercase tracking-tight">{name}</div>
                                                    {spec && <div className="text-sm font-bold text-slate-600 mt-0.5">{spec}</div>}
                                                    {item.note && <div className="text-sm italic text-slate-600 mt-0.5">* {item.note}</div>}
                                                </td>
                                                <td className="text-center font-bold">{item.qty}</td>
                                                <td className="text-right font-medium">{Number(item.appliedPrice).toLocaleString()}</td>
                                                <td className="text-right font-bold">{(item.appliedPrice * item.qty).toLocaleString()}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                            <div className="flex justify-between items-center bg-slate-50 p-6 rounded-xl border border-black/10">
                                <span className="text-2xl font-bold uppercase tracking-wider">Tổng tiền thanh toán:</span>
                                <span className="text-5xl font-black italic text-red-600">
                                    {Number(previewData ? previewData.total : cart.reduce((acc, i) => acc + (i.appliedPrice * i.qty), 0)).toLocaleString()}đ
                                </span>
                            </div>
                            <div className="mt-16 text-center">
                                <p className="text-xl font-bold uppercase tracking-[0.3em] text-slate-800">Trân Trọng Cảm Ơn Quý Khách</p>
                                <p className="text-sm italic text-slate-400 mt-2 uppercase tracking-wide">Chúc Quý Khách Vạn Sự Như Ý • Mua May Bán Đắt</p>
                            </div>
                        </div>
                    </div>

                    {/* Phủ màn hình khi đang xử lý đồng bộ */}
                    {loading && <div className="fixed inset-0 bg-white/70 z-[300] flex items-center justify-center font-black text-blue-600 animate-pulse text-xs uppercase tracking-widest">HỆ THỐNG ĐANG XỬ LÝ...</div>}
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
