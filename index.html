<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ngọc Lan - Bình Thuận</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.15.0/babel.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f1f5f9; 
            overscroll-behavior-y: contain;
        }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .active-tab { color: #2563eb; transform: translateY(-4px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .font-times { font-family: "Times New Roman", Times, serif !important; }
        
        @keyframes pulse-small {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .pulse-badge { animation: pulse-small 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const SearchIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const HomeIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>;
        const ChartIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>;
        const CartIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
        );

        // Hàm hỗ trợ tách tên sản phẩm và quy cách đóng gói trong ngoặc đơn
        const parseProductName = (fullName) => {
            if (!fullName) return { name: '', spec: '' };
            const match = fullName.match(/^(.*?)\s*\(([^)]+)\)\s*$/);
            if (match) {
                return {
                    name: match[1].trim(),
                    spec: `(${match[2].trim()})`
                };
            }
            return { name: fullName, spec: '' };
        };

        function App() {
            const [view, setView] = useState('pos');
            const [cart, setCart] = useState([]);
            const [customer, setCustomer] = useState('Khách lẻ');
            const [orderNote, setOrderNote] = useState('');
            const [custSearch, setCustSearch] = useState('');
            const [prodSearch, setProdSearch] = useState('');
            const [cloudData, setCloudData] = useState({ products: [], customers: [], sales: [] });
            const [sheetUrl, setSheetUrl] = useState(localStorage.getItem('KC_POS_URL') || '');
            const [loading, setLoading] = useState(false);
            const [showBill, setShowBill] = useState(false);
            const [billImg, setBillImg] = useState(null);
            const [previewData, setPreviewData] = useState(null);
            
            const [selectingItem, setSelectingItem] = useState(null);
            const [isEditing, setIsEditing] = useState(false);
            const [inputQty, setInputQty] = useState(1);
            const [inputNote, setInputNote] = useState('');
            
            const [showAddModal, setShowAddModal] = useState(null);
            const [formData, setFormData] = useState({ name: '', val: '' });
            
            const [reportFilter, setReportFilter] = useState('day');
            const [customDate, setCustomDate] = useState({ start: '', end: '' });
            const [toast, setToast] = useState(null);

            const receiptRef = useRef(null);
            const cartEndRef = useRef(null);

            useEffect(() => { 
                if (sheetUrl) {
                    fetchData(); 
                } else {
                    setView('settings');
                }
            }, []);

            const triggerToast = (message, type = 'info') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const fetchData = async () => {
                if (!sheetUrl) {
                    triggerToast("Vui lòng cấu hình URL Google Sheets trước!", "error");
                    return;
                }
                setLoading(true);
                try {
                    const res = await fetch(`${sheetUrl}?action=getData&_t=${Date.now()}`);
                    const data = await res.json();
                    
                    // Đảm bảo dữ liệu nhận về có cấu trúc mảng hợp lệ
                    const validatedData = {
                        products: Array.isArray(data.products) ? data.products : [],
                        customers: Array.isArray(data.customers) ? data.customers : [],
                        sales: Array.isArray(data.sales) ? data.sales : []
                    };
                    
                    setCloudData(validatedData);
                    triggerToast("Tải dữ liệu thành công!", "success");
                } catch (e) { 
                    console.error(e); 
                    triggerToast("Lỗi kết nối hoặc URL không đúng!", "error");
                }
                setLoading(false);
            };

            const filteredCustomers = useMemo(() => {
                if (!custSearch || !cloudData.customers) return [];
                return cloudData.customers.filter(c => c && c.name && c.name.toLowerCase().includes(custSearch.toLowerCase()));
            }, [custSearch, cloudData.customers]);

            const filteredProducts = useMemo(() => {
                if (!cloudData.products) return [];
                return cloudData.products.filter(p => p && p.name && p.name.toLowerCase().includes(prodSearch.toLowerCase()));
            }, [prodSearch, cloudData.products]);

            const filteredSales = useMemo(() => {
                if (!cloudData.sales) return [];
                const now = new Date();
                return cloudData.sales.filter(s => {
                    const dateVal = s.date || s['Ngày'];
                    if (!dateVal) return false;
                    const saleDate = new Date(dateVal);
                    if (isNaN(saleDate.getTime())) return false;

                    if (reportFilter === 'day') return saleDate.toDateString() === now.toDateString();
                    if (reportFilter === 'month') return saleDate.getMonth() === now.getMonth() && saleDate.getFullYear() === now.getFullYear();
                    if (reportFilter === 'year') return saleDate.getFullYear() === now.getFullYear();
                    if (reportFilter === 'custom') {
                        if (!customDate.start || !customDate.end) return true;
                        const start = new Date(customDate.start); start.setHours(0,0,0,0);
                        const end = new Date(customDate.end); end.setHours(23,59,59,999);
                        return saleDate >= start && saleDate <= end;
                    }
                    return true;
                });
            }, [cloudData.sales, reportFilter, customDate]);

            const reportTotal = useMemo(() => {
                return filteredSales.reduce((acc, s) => acc + Number(s.total || s['Tổng'] || 0), 0);
            }, [filteredSales]);

            const handleSelectItem = (product) => {
                setSelectingItem(product);
                setIsEditing(false);
                setInputQty(1);
                setInputNote('');
            };

            const handleEditCartItem = (item, index) => {
                setSelectingItem({ ...item, cartIndex: index });
                setIsEditing(true);
                setInputQty(item.qty);
                setInputNote(item.note || '');
            };

            const handleUpdateCart = () => {
                const parsedQty = parseInt(inputQty);
                const qty = isNaN(parsedQty) || parsedQty <= 0 ? 1 : parsedQty;
                
                if (isEditing) {
                    const newCart = [...cart];
                    newCart[selectingItem.cartIndex] = {
                        ...newCart[selectingItem.cartIndex],
                        qty: qty,
                        note: inputNote
                    };
                    setCart(newCart);
                    triggerToast("Đã cập nhật giỏ hàng!", "success");
                } else {
                    setCart([...cart, { 
                        ...selectingItem, 
                        qty: qty, 
                        note: inputNote, 
                        appliedPrice: Number(selectingItem.price) || 0, 
                        id: Date.now() 
                    }]);
                    triggerToast("Đã thêm vào giỏ hàng!", "success");
                    setTimeout(() => {
                        cartEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                }
                setSelectingItem(null);
                setInputNote('');
            };

            const removeFromCart = (index) => {
                setCart(cart.filter((_, i) => i !== index));
                setSelectingItem(null);
                triggerToast("Đã xóa khỏi đơn hàng!");
            };

            const saveOrder = async () => {
                if (!sheetUrl) {
                    triggerToast("Vui lòng cấu hình URL Google Sheets trước!", "error");
                    return;
                }
                if (cart.length === 0) {
                    triggerToast("Giỏ hàng của chị đang trống!", "error");
                    return;
                }
                setLoading(true);
                setPreviewData(null); 
                const total = cart.reduce((acc, i) => acc + (i.appliedPrice * i.qty), 0);
                const details = cart.map(i => `${i.name} (x${i.qty}) [Giá:${i.appliedPrice}]${i.note ? ` [Ghi chú: ${i.note}]` : ''}`).join(', ');
                const orderData = { action: 'saveOrder', customer, note: orderNote, total, details };
                
                try {
                    await fetch(sheetUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(orderData) });
                    setShowBill(true);
                    
                    // Chờ giao diện render hoàn tất trước khi chụp màn hình bằng html2canvas
                    setTimeout(async () => {
                        if (receiptRef.current) {
                            try {
                                const canvas = await html2canvas(receiptRef.current, { 
                                    scale: 2,
                                    useCORS: true,
                                    allowTaint: true,
                                    backgroundColor: "#ffffff"
                                });
                                setBillImg(canvas.toDataURL('image/png'));
                                triggerToast("Đã tạo hóa đơn thành công!", "success");
                            } catch (err) {
                                console.error("Lỗi chụp hóa đơn:", err);
                                triggerToast("Không thể xuất ảnh hóa đơn tự động!", "error");
                            }
                        }
                        setLoading(false);
                    }, 1200);
                } catch (e) { 
                    triggerToast("Lỗi kết nối khi lưu đơn hàng!", "error"); 
                    setLoading(false); 
                }
            };

            const parseDetails = (detailsStr) => {
                if (!detailsStr) return [];
                const itemStrings = detailsStr.split(/, (?=[^\]]*(?:\[|$))/); 
                return itemStrings.map((str, idx) => {
                    const nameMatch = str.match(/^(.*?) \(x(\d+)\)/);
                    const priceMatch = str.match(/\[Giá:?\s*(\d+)\]/i);
                    const noteMatch = str.match(/\[Ghi chú:?\s*(.*?)\]/i);
                    return {
                        id: Date.now() + idx, 
                        name: nameMatch ? nameMatch[1].trim() : str.trim(),
                        qty: nameMatch ? parseInt(nameMatch[2]) : 1,
                        appliedPrice: priceMatch ? parseInt(priceMatch[1]) : 0,
                        note: noteMatch ? noteMatch[1].trim() : ''
                    };
                });
            };

            const handleViewHistory = (sale) => {
                setLoading(true);
                const detailsStr = sale.details || sale['Chi tiết'] || "";
                const items = parseDetails(detailsStr);
                setPreviewData({
                    customer: sale.customer || sale['Khách hàng'] || 'Khách lẻ',
                    note: sale.note || sale['Ghi chú'] || '',
                    date: new Date(sale.date || sale['Ngày']).toLocaleString('vi-VN'),
                    total: sale.total || sale['Tổng'] || 0,
                    items: items,
                    originalDetails: detailsStr 
                });
                setShowBill(true);
                
                setTimeout(async () => {
                    if (receiptRef.current) {
                        try {
                            const canvas = await html2canvas(receiptRef.current, { 
                                scale: 2,
                                useCORS: true,
                                allowTaint: true,
                                backgroundColor: "#ffffff"
                            });
                            setBillImg(canvas.toDataURL('image/png'));
                        } catch (err) {
                            console.error(err);
                            triggerToast("Lỗi kết xuất ảnh hóa đơn!", "error");
                        }
                    }
                    setLoading(false);
                }, 1000);
            };

            const handleEditOldOrder = () => {
                if (!previewData) return;
                setCart(previewData.items);
                setCustomer(previewData.customer);
                setOrderNote(previewData.note + " (Sửa đơn cũ)");
                setShowBill(false);
                setBillImg(null);
                setPreviewData(null);
                setView('pos');
                triggerToast("Đã chuyển thông tin đơn cũ vào giỏ!");
            };

            const closeBill = () => {
                setShowBill(false); 
                setBillImg(null);
                if (!previewData) { 
                    setCart([]); 
                    setCustomer('Khách lẻ'); 
                    setOrderNote(''); 
                    fetchData(); 
                }
                setPreviewData(null);
            };

            const handleAddNew = async () => {
                if (!sheetUrl) {
                    triggerToast("Vui lòng cấu hình URL Google Sheets trước!", "error");
                    return;
                }
                if (!formData.name) {
                    triggerToast("Vui lòng nhập tên đầy đủ!", "error");
                    return;
                }
                setLoading(true);
                const action = showAddModal === 'cust' ? 'addCustomer' : 'addProduct';
                const payload = { action, name: formData.name };
                if (showAddModal === 'cust') {
                    payload.note = formData.val; 
                } else {
                    payload.price = Number(formData.val) || 0;
                }
                try {
                    await fetch(sheetUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setShowAddModal(null); 
                    setFormData({ name: '', val: '' });
                    triggerToast("Thêm mới thành công! Đang tải lại dữ liệu...", "success");
                    setTimeout(fetchData, 1500);
                } catch (e) { 
                    triggerToast("Đã xảy ra lỗi khi thêm dữ liệu mới!", "error"); 
                }
                setLoading(false);
            };

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative overflow-hidden bg-slate-50">
                    <header className="px-5 py-4 bg-white flex justify-between items-center z-20 shadow-sm">
                        <div className="flex flex-col">
                            <h1 className="text-lg font-black text-blue-600 italic uppercase leading-none">Ngọc Lan</h1>
                            <span className="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Bình Thuận - VIPPRO</span>
                        </div>
                        <button onClick={fetchData} className={`p-2 bg-slate-50 rounded-full ${loading ? 'animate-spin' : ''}`}>🔄</button>
                    </header>

                    {/* Hộp thoại thông báo Toast */}
                    {toast && (
                        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[350] bg-slate-900 text-white text-xs font-bold px-4 py-3 rounded-full shadow-2xl flex items-center gap-2 animate-up">
                            <span className={toast.type === 'success' ? 'text-green-400' : toast.type === 'error' ? 'text-red-400' : 'text-blue-400'}>
                                {toast.type === 'success' ? '✓' : toast.type === 'error' ? '✖' : 'ℹ'}
                            </span>
                            {toast.message}
                        </div>
                    )}

                    <main className="flex-1 overflow-y-auto p-4 pb-48 no-scrollbar scroll-smooth">
                        {view === 'pos' && (
                            <div className="space-y-4 animate-up">
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-4 flex items-center text-slate-400"><SearchIcon /></div>
                                    <input className="w-full pl-11 pr-4 py-4 glass-card outline-none text-sm font-bold" placeholder="Tìm tên khách..." value={custSearch} onChange={e => setCustSearch(e.target.value)} />
                                </div>
                                {filteredCustomers.length > 0 && (
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                        {filteredCustomers.map((c, i) => (
                                            <button key={i} onClick={() => { setCustomer(c.name); setOrderNote(c.note || ''); setCustSearch(''); }} className="px-4 py-2 bg-blue-600 text-white rounded-full text-[10px] font-black uppercase whitespace-nowrap shadow-lg">{c.name}</button>
                                        ))}
                                    </div>
                                )}
                                <div className="glass-card p-5 border-l-8 border-blue-600">
                                    <div className="flex justify-between mb-1"><span className="text-[10px] font-black text-slate-300 uppercase">Khách hàng</span> <button onClick={() => setShowAddModal('cust')} className="text-blue-600 font-black text-[10px] uppercase">+ Khách mới</button></div>
                                    <input className="w-full font-black text-xl bg-transparent outline-none" value={customer} onChange={e => setCustomer(e.target.value)} />
                                    <input className="w-full text-xs font-bold text-slate-400 bg-transparent outline-none mt-1" value={orderNote} onChange={e => setOrderNote(e.target.value)} placeholder="SĐT/Địa chỉ..." />
                                </div>

                                <div className="space-y-3 pt-2">
                                    <div className="flex justify-between items-center px-1">
                                        <span className="text-[10px] font-black text-slate-300 uppercase">Danh mục SP</span>
                                        <button onClick={() => setShowAddModal('prod')} className="text-blue-600 font-black text-[10px] uppercase">+ Thêm SP mới</button>
                                    </div>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-4 flex items-center text-slate-400"><SearchIcon /></div>
                                        <input className="w-full pl-11 pr-4 py-4 glass-card outline-none text-sm font-bold shadow-sm" placeholder="Tìm tên sản phẩm..." value={prodSearch} onChange={e => setProdSearch(e.target.value)} />
                                    </div>
                                    
                                    <div className="flex flex-col gap-3">
                                        {filteredProducts.map((p, i) => {
                                            const { name, spec } = parseProductName(p.name);
                                            return (
                                                <button key={i} onClick={() => handleSelectItem(p)} className="glass-card p-4 text-left active:scale-95 transition border border-transparent active:border-blue-100 flex justify-between items-center w-full">
                                                    <div className="flex-1 pr-3">
                                                        <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Sản phẩm</div>
                                                        <div className="text-sm font-black text-slate-800 uppercase line-clamp-2">{name}</div>
                                                        {spec && <div className="text-xs font-bold text-blue-500 mt-1">{spec}</div>}
                                                    </div>
                                                    <div className="text-right flex-shrink-0">
                                                        <div className="text-lg font-black italic text-blue-600">{Number(p.price || 0).toLocaleString()}đ</div>
                                                        <div className="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Chọn mua ➔</div>
                                                    </div>
                                                </button>
                                            );
                                        })}
                                        {filteredProducts.length === 0 && (
                                            <div className="text-center py-8 px-4 text-xs font-bold text-slate-400 bg-white rounded-3xl shadow-sm">
                                                {!sheetUrl ? 'Chưa kết nối URL Google Sheets. Vui lòng vào Cài đặt để thiết lập.' : 'Không tìm thấy sản phẩm nào'}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {cart.length > 0 && (
                                    <div className="space-y-2 pt-4 border-t-2 border-dashed border-slate-200">
                                        <div className="flex justify-between items-center px-1">
                                            <span className="text-[10px] font-black text-slate-300 uppercase">Đơn hàng hiện tại</span>
                                            <button onClick={() => { setCart([]); triggerToast("Đã xóa toàn bộ đơn!"); }} className="text-red-500 font-black text-[9px] uppercase">Xóa hết ✖</button>
                                        </div>
                                        {cart.map((item, i) => {
                                            const { name, spec } = parseProductName(item.name);
                                            return (
                                                <div key={i} onClick={() => handleEditCartItem(item, i)} className="glass-card p-4 flex justify-between items-center animate-up border-r-4 border-blue-500 active:bg-slate-50">
                                                    <div className="flex-1">
                                                        <div className="text-sm font-black uppercase">
                                                            {name} <span className="text-blue-600">x{item.qty}</span>
                                                        </div>
                                                        {spec && <div className="text-xs font-bold text-blue-500 mt-0.5">{spec}</div>}
                                                        {item.note && <div className="text-[10px] font-bold text-slate-400 italic mt-1">📌 {item.note}</div>}
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="font-black">{(item.appliedPrice * item.qty).toLocaleString()}đ</div>
                                                        <div className="text-[9px] text-blue-600 font-bold uppercase tracking-widest mt-0.5">Sửa ✎</div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        <div ref={cartEndRef} className="h-4 w-full"></div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'report' && (
                            <div className="space-y-3 animate-up pb-10">
                                <div className="glass-card p-3 flex flex-col gap-3">
                                    <div className="flex bg-slate-100 p-1 rounded-2xl">
                                        {['day', 'month', 'year', 'custom'].map(type => (
                                            <button key={type} onClick={() => setReportFilter(type)} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-xl transition-all ${reportFilter === type ? 'bg-white shadow-sm text-blue-600' : 'text-slate-400'}`}>
                                                {type === 'day' ? 'Ngày' : type === 'month' ? 'Tháng' : type === 'year' ? 'Năm' : 'Lọc'}
                                            </button>
                                        ))}
                                    </div>
                                    {reportFilter === 'custom' && (
                                        <div className="flex gap-2 items-center px-1 animate-up">
                                            <input type="date" className="flex-1 text-[11px] font-bold p-2 bg-slate-50 border rounded-lg outline-none" value={customDate.start} onChange={e => setCustomDate({...customDate, start: e.target.value})} />
                                            <span className="text-slate-300">➔</span>
                                            <input type="date" className="flex-1 text-[11px] font-bold p-2 bg-slate-50 border rounded-lg outline-none" value={customDate.end} onChange={e => setCustomDate({...customDate, end: e.target.value})} />
                                        </div>
                                    )}
                                    <div className="px-2 py-1 flex justify-between items-end border-t border-slate-50 pt-3">
                                        <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Doanh thu tổng:</div>
                                        <div className="text-xl font-black italic text-blue-600 leading-none">{reportTotal.toLocaleString()}đ</div>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    {filteredSales.slice().reverse().map((s, i) => (
                                        <div key={i} className="glass-card p-4 flex justify-between items-center shadow-sm">
                                            <div className="flex-1 mr-3">
                                                <div className="text-sm font-black uppercase truncate">{s.customer || s['Khách hàng']}</div>
                                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-tight">{new Date(s.date || s['Ngày']).toLocaleString('vi-VN')}</div>
                                            </div>
                                            <div className="text-right flex flex-col items-end gap-1">
                                                <div className="text-sm font-black text-blue-600 italic">{(Number(s.total || s['Tổng'])).toLocaleString()}đ</div>
                                                <button onClick={() => handleViewHistory(s)} className="px-3 py-1 bg-blue-50 text-blue-600 rounded-lg text-[10px] font-black uppercase tracking-widest">Chi tiết</button>
                                            </div>
                                        </div>
                                    ))}
                                    {filteredSales.length === 0 && (
                                        <div className="text-center py-10 text-xs font-bold text-slate-400">Không có dữ liệu hóa đơn nào trong khoảng thời gian này</div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="glass-card p-6 space-y-5 animate-up">
                                <h3 className="font-black text-lg text-slate-800">Cấu hình URL</h3>
                                <textarea className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-[10px] font-mono outline-none focus:border-blue-500" rows="6" value={sheetUrl} onChange={e => {setSheetUrl(e.target.value); localStorage.setItem('KC_POS_URL', e.target.value)}} placeholder="Nhập URL Web App từ Google Apps Script của chị đẹp..." />
                                <button onClick={() => {fetchData(); setView('pos');}} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs active:scale-95 transition">Đồng bộ dữ liệu</button>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 inset-x-0 bg-white/10 backdrop-blur-xl border-t border-slate-100 px-10 py-5 flex justify-around items-center z-50 rounded-t-[32px] shadow-lg">
                        <button onClick={() => setView('pos')} className={`flex flex-col items-center ${view === 'pos' ? 'active-tab' : 'text-slate-600'}`}><HomeIcon /><span className="text-[9px] font-black uppercase mt-1">Bán hàng</span></button>
                        <button onClick={() => setView('report')} className={`flex flex-col items-center ${view === 'report' ? 'active-tab' : 'text-slate-600'}`}><ChartIcon /><span className="text-[9px] font-black uppercase mt-1">Báo cáo</span></button>
                        <button onClick={() => setView('settings')} className={`flex flex-col items-center ${view === 'settings' ? 'active-tab' : 'text-slate-600'}`}>⚙️<span className="text-[9px] font-black uppercase mt-1">Cài đặt</span></button>
                    </nav>

                    {view === 'pos' && cart.length > 0 && !selectingItem && (
                        <div className="fixed bottom-28 inset-x-5 z-40 animate-up flex flex-col gap-3">
                            <button 
                                onClick={() => cartEndRef.current?.scrollIntoView({ behavior: 'smooth' })}
                                className="self-end w-12 h-12 bg-white rounded-full shadow-xl flex items-center justify-center text-blue-600 border border-blue-50 relative active:scale-90 transition-transform pulse-badge"
                            >
                                <CartIcon />
                                <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black px-1.5 py-0.5 rounded-full border-2 border-white leading-none">
                                    {cart.reduce((acc, i) => acc + i.qty, 0)}
                                </span>
                            </button>

                            <button onClick={saveOrder} className="w-full bg-slate-900 text-white p-5 rounded-[24px] shadow-2xl flex justify-between items-center active:scale-95 transition">
                                <div className="text-left">
                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Thanh toán</div>
                                    <div className="text-2xl font-black italic">
                                        {cart.reduce((acc, i) => acc + (i.appliedPrice * i.qty), 0).toLocaleString()}đ
                                    </div>
                                </div>
                                <div className="bg-blue-600 px-6 py-2.5 rounded-full font-black text-[11px] uppercase tracking-widest">LƯU ĐƠN ➔</div>
                            </button>
                        </div>
                    )}

                    {selectingItem && (() => {
                        const { name, spec } = parseProductName(selectingItem.name);
                        return (
                            <div className="fixed inset-0 bg-black/60 z-[100] flex items-end p-4 backdrop-blur-sm">
                                <div className="bg-white w-full p-7 rounded-t-[40px] space-y-6 animate-up">
                                    <div className="flex justify-between items-start">
                                        <div className="flex-1 pr-4">
                                            <div className="text-[10px] font-black text-blue-600 uppercase mb-1">{isEditing ? 'Đang chỉnh sửa' : 'Thêm sản phẩm'}</div>
                                            <div className="font-black text-xl uppercase tracking-tight text-slate-800 leading-none">{name}</div>
                                            {spec && <div className="text-sm font-bold text-blue-500 mt-1.5">{spec}</div>}
                                        </div>
                                        {isEditing && (
                                            <button onClick={() => removeFromCart(selectingItem.cartIndex)} className="px-4 py-2 bg-red-50 text-red-500 rounded-xl text-[10px] font-black uppercase">Xóa khỏi đơn</button>
                                        )}
                                    </div>
                                    <div className="flex items-center justify-between bg-slate-50 p-6 rounded-3xl">
                                        <button onClick={() => {
                                            const val = Math.max(1, (parseInt(inputQty) || 1) - 1);
                                            setInputQty(val);
                                        }} className="w-14 h-14 bg-white rounded-full shadow-lg text-2xl font-bold flex items-center justify-center select-none">-</button>
                                        <input 
                                            type="number" 
                                            inputMode="numeric" 
                                            className="w-32 bg-transparent text-center text-6xl font-black italic outline-none text-slate-900 border-b-4 border-blue-100 focus:border-blue-600" 
                                            value={inputQty} 
                                            onChange={(e) => {
                                                const rawVal = e.target.value;
                                                setInputQty(rawVal === '' ? '' : parseInt(rawVal) || 0);
                                            }} 
                                            onBlur={() => {
                                                if (inputQty === '' || inputQty <= 0) setInputQty(1);
                                            }}
                                            onFocus={(e) => e.target.select()} 
                                        />
                                        <button onClick={() => {
                                            const val = (parseInt(inputQty) || 0) + 1;
                                            setInputQty(val);
                                        }} className="w-14 h-14 bg-white rounded-full shadow-lg text-2xl font-bold flex items-center justify-center select-none">+</button>
                                    </div>
                                    <input className="w-full p-5 bg-slate-50 rounded-2xl outline-none font-bold text-center italic" placeholder="Ghi chú sản phẩm này..." value={inputNote} onChange={e => setInputNote(e.target.value)} />
                                    <div className="flex gap-3">
                                        <button onClick={() => setSelectingItem(null)} className="flex-1 py-5 font-bold text-slate-400 uppercase tracking-widest">Đóng</button>
                                        <button onClick={handleUpdateCart} className="flex-[2] bg-blue-600 text-white py-5 rounded-[24px] font-black uppercase tracking-[0.2em] shadow-xl active:scale-95 transition">
                                            {isEditing ? 'Cập nhật đơn' : 'Thêm vào đơn'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {showBill && (
                        <div className="fixed inset-0 z-[200] bg-black/80 backdrop-blur-md flex flex-col justify-end">
                            <div className="bg-white w-full rounded-t-[40px] p-6 space-y-4 animate-up overflow-hidden flex flex-col max-h-[95vh]">
                                <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-2"></div>
                                <div className="flex-1 overflow-y-auto rounded-3xl border border-slate-100 bg-slate-50 no-scrollbar">
                                    {billImg ? <img src={billImg} className="w-full h-auto" /> : <div className="h-64 flex items-center justify-center font-black text-blue-600 animate-pulse uppercase tracking-widest">ĐANG TẠO BILL...</div>}
                                </div>
                                
                                <div className="flex gap-3">
                                    <button onClick={closeBill} className="flex-1 py-5 bg-slate-100 text-slate-600 rounded-[24px] font-black uppercase tracking-widest text-xs shadow-sm">Đóng</button>
                                    {previewData && (
                                        <button onClick={handleEditOldOrder} className="flex-[1.5] bg-orange-500 text-white py-5 rounded-[24px] font-black uppercase tracking-widest text-xs shadow-xl active:scale-95 transition">
                                            ✏️ Sửa đơn này
                                        </button>
                                    )}
                                    {!previewData && <button onClick={closeBill} className="flex-[2] bg-blue-600 text-white py-5 rounded-[24px] font-black uppercase tracking-widest text-xs shadow-xl active:scale-95 transition">Xong</button>}
                                </div>
                            </div>
                        </div>
                    )}

                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-center p-6 backdrop-blur-sm">
                            <div className="bg-white w-full p-8 rounded-[32px] space-y-4 animate-up">
                                <h3 className="font-black text-center uppercase text-blue-600 tracking-widest">{showAddModal === 'cust' ? 'Thêm khách hàng' : 'Thêm sản phẩm'}</h3>
                                <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold" placeholder={showAddModal === 'cust' ? 'Tên khách...' : 'Tên sản phẩm...'} value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold" placeholder={showAddModal === 'cust' ? 'SĐT/Địa chỉ...' : 'Giá bán...'} type={showAddModal === 'prod' ? 'number' : 'text'} value={formData.val} onChange={e => setFormData({...formData, val: e.target.value})} />
                                <div className="flex gap-3 pt-2">
                                    <button onClick={() => setShowAddModal(null)} className="flex-1 py-4 font-bold text-slate-400">Hủy</button>
                                    <button onClick={handleAddNew} className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest shadow-lg">Xác nhận</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Vùng hóa đơn ẩn để html2canvas thực hiện chuyển đổi ảnh */}
                    <div className="fixed -left-[9999px] top-0 font-times">
                        <div ref={receiptRef} className="w-[800px] bg-white p-20 text-black">
                            <div className="text-center mb-16">
                                <h1 className="text-5xl font-bold uppercase tracking-[0.1em] text-slate-900 mb-4">Ngọc Lan</h1>
                                <p className="text-2xl font-bold uppercase tracking-[0.4em]">Bình Thuận</p>
                            </div>
                            <div className="text-center mb-12 border-y-4 border-double border-black py-4">
                                <h2 className="text-3xl font-bold uppercase tracking-[0.3em]">Đơn Hàng</h2>
                            </div>
                            <div className="mb-14 space-y-4 text-2xl">
                                <div className="flex justify-between">
                                    <span>Khách hàng: <strong>{previewData ? previewData.customer : customer}</strong></span>
                                    <span className="italic">Ngày: {previewData ? previewData.date : new Date().toLocaleString('vi-VN')}</span>
                                </div>
                                {(previewData ? previewData.note : orderNote) && (
                                    <div className="italic text-red-600 border-l-8 border-red-600 pl-4 py-2 bg-red-50">
                                        📌 Ghi chú: {previewData ? previewData.note : orderNote}
                                    </div>
                                )}
                            </div>
                            <table className="w-full mb-16 border-collapse">
                                <thead className="border-b-4 border-black">
                                    <tr className="text-2xl font-bold uppercase text-left">
                                        <th className="py-6 w-[40%]">Sản phẩm</th>
                                        <th className="py-6 text-center w-[15%]">SL</th>
                                        <th className="py-6 text-right w-[20%]">Giá</th>
                                        <th className="py-6 text-right w-[25%]">T.Tiền</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {(previewData ? previewData.items : cart).map((item, i) => {
                                        const { name, spec } = parseProductName(item.name);
                                        return (
                                            <tr key={i} className="border-b border-dashed border-slate-300 text-2xl">
                                                <td className="py-8">
                                                    <div className="font-bold uppercase leading-tight">{name}</div>
                                                    {spec && <div className="text-xl font-bold text-blue-600 mt-1">{spec}</div>}
                                                    {item.note && <div className="text-xl italic text-red-600 mt-1">* {item.note}</div>}
                                                </td>
                                                <td className="text-center font-bold italic">{item.qty}</td>
                                                <td className="text-right font-bold text-red-600">{Number(item.appliedPrice).toLocaleString()}</td>
                                                <td className="text-right font-bold">{(item.appliedPrice * item.qty).toLocaleString()}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                            <div className="flex justify-between items-center bg-slate-100 p-12 rounded-3xl border-2 border-black">
                                <span className="text-4xl font-bold uppercase tracking-widest">Tổng cộng:</span>
                                <span className="text-8xl font-bold italic text-red-600">
                                    {Number(previewData ? previewData.total : cart.reduce((acc, i) => acc + (i.appliedPrice * i.qty), 0)).toLocaleString()}đ
                                </span>
                            </div>
                            <div className="mt-24 text-center">
                                <p className="text-3xl font-bold uppercase tracking-[0.5em] opacity-80">Trân Trọng Cảm Ơn Quý Khách</p>
                                <p className="text-xl italic opacity-30 mt-4 uppercase">Chúc Quý Khách Mua May Bán Đắt</p>
                            </div>
                        </div>
                    </div>

                    {loading && <div className="fixed inset-0 bg-white/60 z-[300] flex items-center justify-center font-black text-blue-600 animate-pulse uppercase">ĐANG XỬ LÝ...</div>}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
